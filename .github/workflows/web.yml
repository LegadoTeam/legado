name: Build Web

on:
  push:
    branches:
      - master
    paths:
      - '**/modules/web/**'
      - '.github/workflows/web.yml'
      - '.github/scripts/push-web-assets.sh'
  pull_request:
    paths:
      - '**/modules/web/**'
      - '.github/workflows/web.yml'
      - '.github/scripts/push-web-assets.sh'
  workflow_dispatch:

concurrency:
  group: build-web-${{ github.ref }}
  cancel-in-progress: true

env:
  UPSTREAM_REPOSITORY: LegadoTeam/legado

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        id: pnpm-install
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v6
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/web/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Build and move files
        working-directory: modules/web
        run: |
          pnpm i
          pnpm build
          version="v$(date -d "8 hour" -u +3.%y.%m%d%H)"
          echo "APP_VER=$version" >> $GITHUB_ENV

      - name: Commit web assets
        id: web-commit
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && github.repository == env.UPSTREAM_REPOSITORY }}
        uses: stefanzweifel/git-auto-commit-action@v7.2.0
        with:
          commit_message: Bump web ${{ env.APP_VER}}
          file_pattern: app/src/main/assets/web/vue/
          skip_fetch: true
          skip_push: true

      - name: Push web assets
        if: ${{ steps.web-commit.outputs.changes_detected == 'true' }}
        run: bash .github/scripts/push-web-assets.sh

