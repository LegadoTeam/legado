version: 2

updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      kotlin_KSP:
        patterns:
          - "org.jetbrains.kotlin:*"
          - "com.google.devtools.ksp"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/modules/web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
