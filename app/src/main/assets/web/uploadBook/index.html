</div>
<!-- ios 暂不支持提示 start -->

<!-- 浏览器打开提示 start -->
<div class="mask" id="mask_2">
    <div class="t_tc" id="safari"></div>
</div>
<!-- 浏览器打开提示 end -->

<script>
    //alert(navigator.userAgent)
    var browser={
        versions:function(){
            var u = navigator.userAgent;
            return {//移动终端浏览器版本信息
                trident: u.indexOf('Trident') > -1, //IE内核
                presto: u.indexOf('Presto') > -1, //opera内核
                webKit: u.indexOf('AppleWebKit') > -1, //苹果、谷歌内核
                gecko: u.indexOf('Gecko') > -1 && u.indexOf('KHTML') == -1, //火狐内核
                mobile: !!u.match(/AppleWebKit.*Mobile.*/), //是否为移动终端
                ios: !!u.match(/\(i[^;]+;( U;)? CPU.+Mac OS X/), //ios终端
                android: u.indexOf('Android') > -1 || u.indexOf('Linux') > -1, //android终端或者uc浏览器
                iPhone: u.indexOf('iPhone') > -1 , //是否为iPhone或者QQHD浏览器
                iPad: u.indexOf('iPad') > -1, //是否iPad
                webApp: u.indexOf('Safari') == -1, //是否web应该程序，没有头部与底部
                ie8: u.indexOf('MSIE 8.0') > -1, //是否是ie8
                ie7: u.indexOf('MSIE 7.0') > -1  //是否是ie7
            };
        }()
    };

    var isH5 = browser.versions.mobile || browser.versions.ios || browser.versions.android
            || browser.versions.iPhone || browser.versions.iPad;

    var ie = browser.versions.ie7 || browser.versions.ie8;

    var ios = browser.versions.ios;

    var ua = navigator.userAgent.toLowerCase();

    var src = [];


    if(ie){
        try{
            var swf = new ActiveXObject('ShockwaveFlash.ShockwaveFlash');
            document.getElementById('flash_btn').style.display = 'inline-block';
        }
        catch(e){
            document.getElementById('warning').style.display = 'inline-block';
        }

    }else{
        document.getElementById('h5_btn').style.display = 'inline-block';
    }

    function addScript(src){
        var s;
        for(s in src){
            var myScript= document.createElement('script');
            myScript.setAttribute('src', src[s]);
            document.body.appendChild(myScript);
        }
    }
    var maskDom = document.getElementById('mask_1');
    var maskDom2 = document.getElementById('mask_2');
    if(ios){
        maskDom.style.display="block";
    }
 
    if(ua.match(/MicroMessenger/i)=="micromessenger") {
        maskDom2.style.display="block";
        if(ios){
            maskDom.style.display="none";
            var safariDom = document.getElementById("safari");
            if ((" " + safariDom.className + " ").indexOf(" safariWarn ") === -1) {
                safariDom.className += (safariDom.className ? " " : "") + "safariWarn";
            }
        }
    }

    document.getElementById("close").addEventListener("click", function () {
        maskDom.style.display="none"
    })
</script><script src="./js/common.js"></script><script src="./js/html5_fun.js"></script>
